<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link href="main.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <script type="module" src="main.js"></script>
    <div class="container">
      <div class = "simple_features">
        <div class = "title">Webify</div>
        <div id="color_wheel">
          <img id="wheel_image" class = "color_wheel" src="assets/Gradient_color_wheel.png" >
        </div>
        <div class="three_col_row">
          <div id ="invert_button" class="three_col_row_button">Invert</div>
          <div id = "advanced_button" class="three_col_row_button">Advanced</div>
          <div id = "reset_button" class="three_col_row_button">Reset</div>
        </div>
        <div id="font_selector" class = "three_col_row">
          <div class="tight_button">
            <p style="font-family: 'Arial', sans-serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Verdana', sans-serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Tahoma', sans-serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Trebuchet MS', sans-serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Times New Roman', serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Georgia', serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Garamond', serif; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Courier New', monospace; margin: 0">Aa</p>
          </div>
          <div class="tight_button">
            <p style="font-family: 'Brush Script MT', cursive; margin: 0">Aa</p>
          </div>
        </div>
        <div id = "size_button" class="button">Size</div>
        <div id = "case_button" class="button">Case</div>
        <div id = "zap_button" class="button">Zap</div>
        <div id= "code_button" class="button">Code</div>
        <div id = "share_button" class="button">Share</div>
        <div id = "log">Nothing</div>
      </div>
      <div class = "saving_features">
        <div class = "two_col_row">
          <input type = "file" class = "file_uploader" id = "jsonUpload" accept=".json">
          <div id = "load_button" class = "button">Load</div>
        </div>
        <div id = "save_button" class = "button">Save</div>
        <div class = "preset_list">
          <div class = "title">User Presets</div>
        </div>
      </div>
    </div>
  </body>
</html>
